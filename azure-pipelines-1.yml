trigger: none

pool:
  name: Default

stages:

- stage: Deliver
  displayName: Deliver Artifact
  jobs:
  - job: DeliverJob
    steps:

    - task: DownloadBuildArtifacts@0
      inputs:
        buildType: 'specific'
        project: 'Final Project'
        pipeline: 'CD'
        buildVersionToDownload: 'latest'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(Pipeline.Workspace)'
      continueOnError: true
      displayName: Download CI Artifact

    - script: |
        echo "Artifact download attempted"
        echo "If artifact exists, it is in: $(Pipeline.Workspace)"
      displayName: Deliver Step


- stage: Dev
  displayName: Deploy to Dev
  dependsOn: Deliver
  jobs:
  - job: DevDeploy
    steps:
    - script: echo "Deploying to DEV environment (mock)"
      displayName: Dev Deploy


- stage: QAT
  displayName: Deploy to QAT
  dependsOn: Dev
  jobs:
  - job: QATDeploy
    steps:
    - script: echo "Deploying to QAT environment (mock)"
      displayName: QAT Deploy


- stage: Staging
  displayName: Deploy to Staging
  dependsOn: QAT
  jobs:
  - job: StagingDeploy
    steps:
    - script: echo "Deploying to STAGING environment (mock)"
      displayName: Staging Deploy


- stage: Production
  displayName: Deploy to Production
  dependsOn: Staging
  jobs:
  - job: ProdDeploy
    steps:
    - script: echo "Deploying to PRODUCTION environment (mock)"
      displayName: Prod Deploy